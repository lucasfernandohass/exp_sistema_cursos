services:
  mysql:
    image: mysql:8.3
    container_name: cursoaprenda_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: curso_aprenda
      MYSQL_USER: cursoaprenda
      MYSQL_PASSWORD: cursoaprenda123
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --authentication_policy=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=2147483648
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cursoaprenda_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: cursoaprenda_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 2GB
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cursoaprenda_network

  redis:
    image: redis:7.2-alpine
    container_name: cursoaprenda_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis123
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cursoaprenda_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  cursoaprenda_network:
    driver: bridge