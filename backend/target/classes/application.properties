# Aplicação
spring.application.name=curso-aprenda
server.port=8080
server.servlet.context-path=/api

# Banco de dados
spring.datasource.url=jdbc:mysql://localhost:3307/curso_aprenda?serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=cursoaprenda
spring.datasource.password=cursoaprenda123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT
security.jwt.secret=sua_chave_secreta_minimo_32_caracteres_aqui
security.jwt.expiration-ms=86400000

# Upload de vídeos
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# Logs
logging.level.com.cursoaprenda=DEBUG

# Flyway habilitado para executar migrações em db/migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
logging.level.org.flywaydb=DEBUG
